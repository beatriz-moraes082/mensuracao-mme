name: Relatório semanal/mensal IMR (MME Vacation Club)

on:
  schedule:
    # Toda segunda 10:45 UTC = 07:45 BRT (margem pra absorver delay típico do GitHub Actions e disparar próximo das 8h)
    - cron: '45 10 * * 1'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Aplicar no ClickUp? (false = dry-run; mostra description+comentário no log)'
        required: false
        default: 'true'
      force_mode:
        description: 'Forçar modo: semanal | mensal | (vazio = automático pela segunda do mês)'
        required: false
        default: ''
      force_date:
        description: 'Simular outra data (YYYY-MM-DD). Útil pra reprocessar uma semana específica'
        required: false
        default: ''

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and post report
        env:
          META_TOKEN:             ${{ secrets.META_TOKEN }}
          META_ACCOUNT:           ${{ secrets.META_ACCOUNT }}
          KOMMO_TOKEN:            ${{ secrets.KOMMO_TOKEN }}
          KOMMO_SUBDOMAIN:        ${{ secrets.KOMMO_SUBDOMAIN }}
          GADS_DEVELOPER_TOKEN:   ${{ secrets.GADS_DEVELOPER_TOKEN }}
          GADS_CLIENT_ID:         ${{ secrets.GADS_CLIENT_ID }}
          GADS_CLIENT_SECRET:     ${{ secrets.GADS_CLIENT_SECRET }}
          GADS_REFRESH_TOKEN:     ${{ secrets.GADS_REFRESH_TOKEN }}
          GADS_CUSTOMER_ID:       ${{ secrets.GADS_CUSTOMER_ID }}
          GADS_LOGIN_CUSTOMER_ID: ${{ secrets.GADS_LOGIN_CUSTOMER_ID }}
          CLICKUP_TOKEN:          ${{ secrets.CLICKUP_TOKEN }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.apply }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --apply"
          fi
          if [ -n "${{ inputs.force_mode }}" ]; then
            ARGS="$ARGS --force-mode ${{ inputs.force_mode }}"
          fi
          if [ -n "${{ inputs.force_date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.force_date }}"
          fi
          python3 mme_report.py $ARGS
