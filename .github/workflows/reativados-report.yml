name: Reativados Report (one-off)

# Disparado manualmente. Não tem schedule — é uma consulta pontual.
on:
  workflow_dispatch:
    inputs:
      period_start:
        description: 'Data inicial (YYYY-MM-DD). Default: 2026-01-01'
        required: false
        default: '2026-01-01'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          KOMMO_SUBDOMAIN=${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_TOKEN=${{ secrets.KOMMO_TOKEN }}
          EOF

      - name: Run reativados report
        env:
          PERIOD_START: ${{ github.event.inputs.period_start }}
        run: python3 fetch_reativados.py
